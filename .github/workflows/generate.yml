name: 주간 퀴즈 생성

on:
  schedule:
    - cron: '0 22 * * 0' # 매주 월요일 오전 7시 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: 문제 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.mjs 25
      - name: 커밋
        run: |
          git config user.name "quiz-bot"
          git config user.email "bot@users.noreply.github.com"
          git add questions.json
          git diff --cached --quiet || git commit -m "chore: 주간 퀴즈 배치 추가 ($(date +%Y-%m-%d))"
          git push
